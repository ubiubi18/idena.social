name: Build and test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Dependency signature audit
        run: npm audit signatures

      - name: Run privacy audit
        run: npm run audit:privacy

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: test-contract-runner/go.sum

      - name: Prepare contract runner sources
        run: |
          git clone --branch vibe/clean-modern-fork https://github.com/ubiubi18/idena-go.git ../idena-go
          git -C ../idena-go checkout 9d3823f3c52def461943068b41288ff01c0e78ad
          git clone --branch vibe/clean-modern-fork https://github.com/ubiubi18/idena-wasm-binding.git ../idena-wasm-binding
          git -C ../idena-wasm-binding checkout 47b198d9b1947de743eb28d7d404a3ead877c720

      - name: Vulnerability scan
        run: npm run audit:contracts

      - name: Test
        run: npm test
