name: Build and test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run privacy audit
        run: npm run audit:privacy

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: test-contract-runner/go.sum

      - name: Prepare contract runner sources
        run: |
          git clone --branch vibe/clean-modern-fork https://github.com/ubiubi18/idena-go.git ../idena-go
          git -C ../idena-go checkout ac94d849bc36da6fe562fdf3cbfcba3c9ee6e5fe
          git clone --branch vibe/clean-modern-fork https://github.com/ubiubi18/idena-wasm-binding.git ../idena-wasm-binding
          git -C ../idena-wasm-binding checkout 5f21701e0c3f7c2a8a12c2240cc14034c742184d

      - name: Vulnerability scan
        run: npm run audit:contracts

      - name: Test
        run: npm test
