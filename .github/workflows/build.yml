name: Build and test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.19.13
          cache: true
          cache-dependency-path: test-contract-runner/go.sum

      - name: Prepare contract runner sources
        run: |
          git clone --depth 1 --branch vibe/clean-modern-fork https://github.com/ubiubi18/idena-go.git ../idena-go
          git -C ../idena-go checkout 475443da197bf10ca81f25dcbd4a651e606e6b35
          git clone --depth 1 --branch vibe/clean-modern-fork https://github.com/ubiubi18/idena-wasm-binding.git ../idena-wasm-binding
          git -C ../idena-wasm-binding checkout 9f5a7638f719cd8c446045e565bde8748ee16c30

      - name: Test
        run: npm test
