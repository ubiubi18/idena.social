name: Build and test

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  IDENA_GO_COMMIT: eeb73fbaf80493e3bcbc4a661fa3a7e2f07ec2bd
  IDENA_WASM_BINDING_COMMIT: 67ba065fdb02aa07cced2a43a261e481ca5b39d9

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Dependency signature audit
        run: npm audit signatures

      - name: Run privacy audit
        run: npm run audit:privacy

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: test-contract-runner/go.sum

      - name: Prepare contract runner sources
        run: |
          git init ../idena-go
          git -C ../idena-go remote add origin https://github.com/ubiubi18/idena-go.git
          git -C ../idena-go fetch --depth 1 origin "$IDENA_GO_COMMIT"
          git -C ../idena-go checkout --detach FETCH_HEAD
          test "$(git -C ../idena-go rev-parse HEAD)" = "$IDENA_GO_COMMIT"
          git init ../idena-wasm-binding
          git -C ../idena-wasm-binding remote add origin https://github.com/ubiubi18/idena-wasm-binding.git
          git -C ../idena-wasm-binding fetch --depth 1 origin "$IDENA_WASM_BINDING_COMMIT"
          git -C ../idena-wasm-binding checkout --detach FETCH_HEAD
          test "$(git -C ../idena-wasm-binding rev-parse HEAD)" = "$IDENA_WASM_BINDING_COMMIT"

      - name: Vulnerability scan
        run: npm run audit:contracts

      - name: Test
        run: npm test
